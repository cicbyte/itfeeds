services:
  itfeeds:
    image: ghcr.io/cicbyte/itfeeds:latest
    container_name: itfeeds
    restart: unless-stopped
    ports:
      # - "8000:8000"  # 固定端口映射
      - "8000"         # 随机端口映射，启动后用 docker port itfeeds 8000 查看
    environment:
      - TZ=Asia/Shanghai
      - GO_ENV=production
    volumes:
      # 首次启动无需手动创建 config.yaml，通过 /init 页面初始化会自动生成
      # 如需挂载自定义配置：cp manifest/config/config.example.yaml manifest/config/config.yaml
      - ./config:/app/manifest/config
      - ./log:/app/resource/log
    networks:
      - itfeeds-network

networks:
  itfeeds-network:
    driver: bridge
    name: itfeeds-network
